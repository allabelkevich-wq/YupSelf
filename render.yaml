services:
  - type: web
    name: yupself-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node bot/index.js
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: 3000
