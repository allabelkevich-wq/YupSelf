services:
  - type: web
    name: yupself-bot
    runtime: node
    plan: starter
    buildCommand: npm ci --ignore-optional || npm ci; npm rebuild swisseph 2>/dev/null || true
    startCommand: node bot/index.js
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: 3000
