services:
  - type: web
    name: yupself-bot
    runtime: node
    plan: starter
    buildCommand: apt-get update -qq && apt-get install -y -qq build-essential python3 2>/dev/null || true; npm install; npm install swisseph 2>/dev/null || echo "swisseph skipped"
    startCommand: node bot/index.js
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: 3000
