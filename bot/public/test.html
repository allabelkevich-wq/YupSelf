<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
button { padding: 15px 30px; font-size: 18px; background: #f59e0b; color: black; border: none; border-radius: 12px; cursor: pointer; margin: 10px 0; display: block; width: 100%; }
#log { white-space: pre-wrap; font-size: 12px; background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; max-height: 400px; overflow-y: auto; }
</style>
</head>
<body>
<h2>YupSelf Test Page</h2>
<div id="info"></div>
<button onclick="testGenerate()">Test Generate</button>
<button onclick="testAstro()">Test Astro</button>
<div id="log"></div>
<img id="result" style="width:100%; margin-top:10px; border-radius:12px; display:none;">

<script>
var log = document.getElementById('log');
function addLog(msg) { log.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n'; log.scrollTop = log.scrollHeight; }

// Info
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
document.getElementById('info').innerHTML =
  'Platform: ' + (tg ? tg.platform : 'browser') + '<br>' +
  'User: ' + (tg && tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : 'none') + '<br>' +
  'URL: ' + window.location.href;

var API = window.location.origin;
addLog('API: ' + API);

function testGenerate() {
  addLog('Starting generate...');
  fetch(API + '/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: 'белый кот на подушке', quality: 'fast' })
  }).then(function(r) {
    addLog('Status: ' + r.status);
    return r.json();
  }).then(function(d) {
    if (d.jobId) {
      addLog('JobId: ' + d.jobId);
      pollJob(d.jobId);
    } else {
      addLog('Error: ' + JSON.stringify(d));
    }
  }).catch(function(e) {
    addLog('Fetch error: ' + e.message);
  });
}

function testAstro() {
  addLog('Starting astro...');
  fetch(API + '/api/astro/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: 'Test', birthdate: '1997-06-24', birthplace: 'Солигорск', birthtime: '08:25', gender: 'female', intention: 'тест' })
  }).then(function(r) {
    addLog('Status: ' + r.status);
    return r.json();
  }).then(function(d) {
    if (d.jobId) {
      addLog('JobId: ' + d.jobId);
      pollJob(d.jobId);
    } else {
      addLog('Error: ' + JSON.stringify(d));
    }
  }).catch(function(e) {
    addLog('Fetch error: ' + e.message);
  });
}

function pollJob(jobId) {
  var attempts = 0;
  var interval = setInterval(function() {
    attempts++;
    addLog('Poll ' + attempts + '...');
    fetch(API + '/api/job/' + jobId).then(function(r) {
      return r.json();
    }).then(function(j) {
      if (j.status === 'done') {
        clearInterval(interval);
        addLog('DONE! Image: ' + (j.imageBase64 ? Math.round(j.imageBase64.length/1024) + 'KB' : 'none'));
        if (j.imageBase64) {
          document.getElementById('result').src = 'data:image/png;base64,' + j.imageBase64;
          document.getElementById('result').style.display = 'block';
        }
        if (j.analysis) addLog('Analysis: ' + j.analysis);
      } else if (j.status === 'error') {
        clearInterval(interval);
        addLog('ERROR: ' + j.error);
      }
    }).catch(function(e) {
      addLog('Poll error: ' + e.message);
    });
    if (attempts > 60) { clearInterval(interval); addLog('TIMEOUT'); }
  }, 3000);
}
</script>
</body>
</html>
