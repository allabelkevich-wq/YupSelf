<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YuPself — AI Image Generation</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --accent-1: #7c3aed;
            --accent-2: #3b82f6;
            --accent: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(124, 58, 237, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        *:not(.result-image) { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px 60px;
        }

        /* ── Шапка ─────────────────────────────────────────── */
        header { text-align: center; margin-bottom: 48px; }
        .logo {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: var(--text-secondary); font-size: 16px; font-weight: 400; margin-top: 6px; }

        /* ── Главный контейнер ──────────────────────────────── */
        .main-container {
            width: 100%;
            max-width: 850px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }

        /* ── Поле ввода ────────────────────────────────────── */
        .input-group { position: relative; margin-bottom: 28px; }
        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 56px 20px 20px;
            color: white;
            font-family: 'Manrope', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }
        textarea::placeholder { color: var(--text-secondary); }
        textarea:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 20px var(--glow);
        }
        .voice-btn {
            position: absolute;
            right: 16px;
            top: 18px;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            padding: 4px;
        }
        .voice-btn:hover { opacity: 1; transform: scale(1.1); }
        .voice-btn.listening { opacity: 1; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
        }
        .example-chip {
            padding: 6px 14px;
            border-radius: 9999px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .example-chip:hover { background: rgba(124, 58, 237, 0.2); color: white; }

        /* ── Настройки (чипы) ──────────────────────────────── */
        .setting-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 10px;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .chips-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .chip {
            padding: 8px 16px;
            border-radius: 9999px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: 'Manrope', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .chip:hover { background: var(--surface-hover); color: white; }
        .chip.active {
            background: var(--accent);
            color: white;
            border-color: transparent;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        /* ── Кнопка генерации ──────────────────────────────── */
        .generate-btn {
            width: 100%;
            padding: 18px;
            border-radius: 9999px;
            border: none;
            background: var(--accent);
            color: white;
            font-family: 'Manrope', sans-serif;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 12px 30px rgba(124, 58, 237, 0.35);
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(124, 58, 237, 0.5);
        }
        .generate-btn:active { transform: translateY(0); }
        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Спиннер ───────────────────────────────────────── */
        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Результат ─────────────────────────────────────── */
        .result-container {
            margin-top: 32px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .result-container.visible { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-image {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .result-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 9999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .result-btn:hover { background: var(--surface-hover); color: white; }
        .result-btn.primary {
            background: var(--accent);
            color: white;
            border-color: transparent;
        }

        /* Аккордеон промта */
        .prompt-toggle {
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }
        .prompt-toggle:hover { color: white; }
        .prompt-text {
            display: none;
            margin-top: 8px;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            word-break: break-word;
        }
        .prompt-text.open { display: block; }

        /* ── Галерея примеров ──────────────────────────────── */
        .gallery {
            margin-top: 48px;
            width: 100%;
            max-width: 850px;
        }
        .gallery-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .gallery-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .gallery-card img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .gallery-card .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            text-align: center;
            font-size: 13px;
            color: white;
            line-height: 1.4;
        }
        .gallery-card:hover .overlay { opacity: 1; }

        /* ── Футер ─────────────────────────────────────────── */
        footer {
            margin-top: 48px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }
        footer a { color: var(--accent-1); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ── Адаптивность ──────────────────────────────────── */
        @media (max-width: 600px) {
            body { padding: 24px 12px 40px; }
            .main-container { padding: 24px 16px; border-radius: 24px; }
            .logo { font-size: 32px; }
            textarea { font-size: 15px; min-height: 100px; }
            .chips-row { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
            .chip { flex-shrink: 0; }
            .result-actions { flex-wrap: wrap; }
            .result-btn { flex: 1 1 45%; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">YuPself</div>
    <div class="subtitle">Создавай изображения силой слова</div>
</header>

<div class="main-container">
    <!-- Поле ввода -->
    <div class="input-group">
        <textarea id="promptInput" placeholder="Опиши, что хочешь увидеть..."></textarea>
        <button class="voice-btn" id="voiceBtn" title="Голосовой ввод">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
    </div>

    <!-- Примеры -->
    <div class="examples">
        <span class="example-chip" data-prompt="Кот-астронавт на поверхности Луны">Кот-астронавт</span>
        <span class="example-chip" data-prompt="Закат над океаном в стиле масляной живописи">Закат маслом</span>
        <span class="example-chip" data-prompt="Логотип кофейни в стиле минимализма">Логотип кофейни</span>
        <span class="example-chip" data-prompt="Футуристический город ночью с неоновым светом">Город будущего</span>
    </div>

    <!-- Стиль -->
    <div class="setting-label">Стиль</div>
    <div class="chips-row" data-group="style">
        <button class="chip active" data-value="photorealistic, 8k, shot on Hasselblad, natural lighting">Фотореализм</button>
        <button class="chip" data-value="editorial photography, high fashion, Vogue aesthetic, dramatic lighting">Эдиториал</button>
        <button class="chip" data-value="cinematic still, anamorphic lens, volumetric fog, color grading">Кинематограф</button>
        <button class="chip" data-value="anime style, Studio Ghibli quality, vibrant colors, detailed backgrounds">Аниме</button>
        <button class="chip" data-value="oil painting, rich impasto textures, classical composition, museum quality">Масло</button>
        <button class="chip" data-value="digital concept art, matte painting, epic scale, atmospheric perspective">Концепт-арт</button>
        <button class="chip" data-value="watercolor painting, wet-on-wet technique, soft bleeding edges, luminous">Акварель</button>
        <button class="chip" data-value="3D render, octane, subsurface scattering, cinematic global illumination">3D рендер</button>
        <button class="chip" data-value="minimalist design, clean composition, negative space, geometric simplicity">Минимализм</button>
        <button class="chip" data-value="surrealist art, dreamlike atmosphere, impossible geometry">Сюрреализм</button>
    </div>

    <!-- Формат -->
    <div class="setting-label">Формат</div>
    <div class="chips-row" data-group="aspect">
        <button class="chip active" data-value="1:1">1:1 Квадрат</button>
        <button class="chip" data-value="9:16">9:16 Stories</button>
        <button class="chip" data-value="16:9">16:9 Широкий</button>
        <button class="chip" data-value="4:5">4:5 Instagram</button>
        <button class="chip" data-value="3:4">3:4 Портрет</button>
        <button class="chip" data-value="2:3">2:3 Постер</button>
        <button class="chip" data-value="21:9">21:9 Кино</button>
    </div>

    <!-- Разрешение -->
    <div class="setting-label">Разрешение</div>
    <div class="chips-row" data-group="size">
        <button class="chip" data-value="512">512px</button>
        <button class="chip active" data-value="1K">1K</button>
        <button class="chip" data-value="2K">2K</button>
        <button class="chip" data-value="4K">4K</button>
    </div>

    <!-- Кнопка -->
    <button class="generate-btn" id="generateBtn">Сгенерировать</button>

    <!-- Результат -->
    <div class="result-container" id="resultContainer">
        <img class="result-image" id="resultImage" alt="Generated image">
        <div class="result-actions">
            <button class="result-btn primary" id="downloadBtn">Скачать</button>
            <button class="result-btn" id="retryBtn">Повторить</button>
            <button class="result-btn" id="newBtn">Новое описание</button>
        </div>
        <div class="prompt-toggle" id="promptToggle">Показать промт</div>
        <div class="prompt-text" id="promptText"></div>
    </div>
</div>

<footer>
    YuPself — AI Image Generation &middot; <a href="https://t.me/YupSelf_bot" target="_blank">@YupSelf_bot</a> &middot; 2026
</footer>

<script>
(function() {
    const API_BASE = window.location.origin;

    // Elements
    const promptInput = document.getElementById("promptInput");
    const generateBtn = document.getElementById("generateBtn");
    const voiceBtn = document.getElementById("voiceBtn");
    const resultContainer = document.getElementById("resultContainer");
    const resultImage = document.getElementById("resultImage");
    const downloadBtn = document.getElementById("downloadBtn");
    const retryBtn = document.getElementById("retryBtn");
    const newBtn = document.getElementById("newBtn");
    const promptToggle = document.getElementById("promptToggle");
    const promptText = document.getElementById("promptText");

    let currentPrompt = "";
    let currentImageData = null;

    // ── Chip selection ──────────────────────────────────────
    document.querySelectorAll(".chips-row").forEach(row => {
        row.addEventListener("click", e => {
            const chip = e.target.closest(".chip");
            if (!chip) return;
            row.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
            chip.classList.add("active");
        });
    });

    // ── Example chips ───────────────────────────────────────
    document.querySelectorAll(".example-chip").forEach(chip => {
        chip.addEventListener("click", () => {
            promptInput.value = chip.dataset.prompt;
            promptInput.focus();
        });
    });

    // ── Get selected values ─────────────────────────────────
    function getSelected(group) {
        const active = document.querySelector(`[data-group="${group}"] .chip.active`);
        return active?.dataset.value || "";
    }

    // ── Generate ────────────────────────────────────────────
    async function generate() {
        const prompt = promptInput.value.trim();
        if (!prompt) { promptInput.focus(); return; }

        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="spinner"></span>Генерирую...';
        resultContainer.classList.remove("visible");

        try {
            const res = await fetch(`${API_BASE}/api/generate`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    prompt,
                    style: getSelected("style"),
                    aspectRatio: getSelected("aspect"),
                    imageSize: getSelected("size"),
                }),
            });

            if (!res.ok) throw new Error("API error");

            const data = await res.json();

            if (data.imageBase64) {
                resultImage.src = `data:image/png;base64,${data.imageBase64}`;
                currentImageData = data.imageBase64;
            } else if (data.imageUrl) {
                resultImage.src = data.imageUrl;
                currentImageData = null;
            } else {
                throw new Error("No image");
            }

            currentPrompt = data.enhancedPrompt || prompt;
            promptText.textContent = currentPrompt;
            resultContainer.classList.add("visible");

        } catch (err) {
            alert("Не удалось сгенерировать. Попробуй другое описание.");
            console.error(err);
        } finally {
            generateBtn.disabled = false;
            generateBtn.textContent = "Сгенерировать";
        }
    }

    generateBtn.addEventListener("click", generate);

    // Enter to generate (Ctrl+Enter or Cmd+Enter)
    promptInput.addEventListener("keydown", e => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
            e.preventDefault();
            generate();
        }
    });

    // ── Retry ───────────────────────────────────────────────
    retryBtn.addEventListener("click", generate);

    // ── New description ─────────────────────────────────────
    newBtn.addEventListener("click", () => {
        promptInput.value = "";
        resultContainer.classList.remove("visible");
        promptInput.focus();
    });

    // ── Download ────────────────────────────────────────────
    downloadBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        if (currentImageData) {
            a.href = `data:image/png;base64,${currentImageData}`;
        } else {
            a.href = resultImage.src;
        }
        a.download = `yupself-${Date.now()}.png`;
        a.click();
    });

    // ── Prompt toggle ───────────────────────────────────────
    promptToggle.addEventListener("click", () => {
        promptText.classList.toggle("open");
        promptToggle.textContent = promptText.classList.contains("open") ? "Скрыть промт" : "Показать промт";
    });

    // ── Voice input (Web Speech API) ────────────────────────
    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = "ru-RU";
        recognition.continuous = false;
        recognition.interimResults = false;

        let listening = false;

        voiceBtn.addEventListener("click", () => {
            if (listening) {
                recognition.stop();
            } else {
                recognition.start();
                voiceBtn.classList.add("listening");
                listening = true;
            }
        });

        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            promptInput.value = text;
        };

        recognition.onend = () => {
            voiceBtn.classList.remove("listening");
            listening = false;
        };

        recognition.onerror = () => {
            voiceBtn.classList.remove("listening");
            listening = false;
        };
    } else {
        voiceBtn.style.display = "none";
    }
})();
</script>

</body>
</html>
